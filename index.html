<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>NutriApp — Gestão de Pacientes e Dietas</title>
<meta name="description" content="Aplicativo para nutricionistas: fichas de pacientes, IMC/TMB automáticos, banco de alimentos, montador de dietas e geração de PDF com assinatura digital.">
<meta name="theme-color" content="#123832">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!--
  Bibliotecas de terceiros (jsPDF e signature_pad).
  Este ambiente de geração não tem acesso à internet, então não foi
  possível baixar os arquivos locais para vendor/jspdf.umd.min.js e
  vendor/signature_pad.umd.min.js. Por enquanto o app carrega essas
  libs via CDN (funciona normalmente com internet). Para funcionar
  100% OFFLINE como o COMO-GERAR-APK.md descreve, baixe os dois
  arquivos abaixo e salve em vendor/, depois troque os <script src>
  para "./vendor/jspdf.umd.min.js" e "./vendor/signature_pad.umd.min.js":
    https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js
    https://cdn.jsdelivr.net/npm/signature_pad@4/dist/signature_pad.umd.min.js
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4/dist/signature_pad.umd.min.js"></script>

<style>
  :root{
    --forest:#123832;
    --emerald:#1f7a5c;
    --emerald-light:#e6f3ee;
    --gold:#c9a227;
    --gold-light:#f5ecd2;
    --paper:#F7F7F1;
    --line:#e4e2da;
    --muted:#6b6f6d;
    --ink:#1c211f;
    --danger:#c1473f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:76px;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* Topbar */
  .topbar{background:var(--forest);color:#fff;padding:16px 18px 20px;border-radius:0 0 20px 20px;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-size:19px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);display:inline-block;}
  .back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:20px;line-height:1;}
  .subtitle{font-size:13px;color:rgba(255,255,255,.72);margin-top:4px;}

  .content{flex:1;padding:16px;}

  /* Cards / boxes */
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .box{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;}
  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .divider{height:1px;background:var(--line);margin:14px 0;}
  .section-title{font-size:13px;font-weight:700;color:var(--forest);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;border:1px solid transparent;width:100%;}
  .btn-row{display:flex;gap:8px;}
  .btn-row .btn{width:auto;flex:1;}
  .btn-primary{background:var(--forest);color:#fff;}
  .btn-ghost{background:var(--emerald-light);color:var(--forest);}
  .btn-outline{background:#fff;color:var(--forest);border-color:var(--line);}
  .btn-gold{background:var(--gold);color:#3a2e05;}
  .btn-danger{background:#fdecea;color:var(--danger);}
  .btn-sm{padding:8px 12px;font-size:13px;width:auto;}

  /* Fields */
  .field{margin-bottom:12px;display:flex;flex-direction:column;gap:6px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .lbl{font-size:12px;font-weight:600;color:var(--muted);}
  input[type=text],input[type=number],input[type=date],select,textarea{
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;background:#fff;color:var(--ink);width:100%;
  }
  textarea{resize:vertical;min-height:70px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--emerald);}

  .search-bar{display:flex;gap:8px;margin-bottom:12px;}
  .search-bar input{flex:1;}

  /* Chips / filters */
  .chip{display:inline-flex;align-items:center;gap:4px;background:var(--emerald-light);color:var(--forest);font-size:12px;font-weight:600;padding:6px 10px;border-radius:999px;margin:2px 4px 2px 0;}
  .filter-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;}
  .filter-chip{flex:0 0 auto;background:#fff;border:1px solid var(--line);padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
  .filter-chip.active{background:var(--forest);color:#fff;border-color:var(--forest);}

  /* Patient cards */
  .patient-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:0 0 auto;}
  .patient-card .name{font-weight:700;font-size:14px;}
  .patient-card .meta{font-size:12px;color:var(--muted);}
  .patient-card .info{flex:1;min-width:0;}
  .goal-tag{font-size:11px;font-weight:700;color:var(--emerald);background:var(--emerald-light);padding:3px 8px;border-radius:999px;}

  .hero-stat{display:flex;justify-content:space-between;text-align:center;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .hero-stat .num{font-size:20px;font-weight:800;color:var(--forest);}
  .hero-stat .u{font-size:11px;color:var(--muted);}

  /* Food rows */
  .food-row,.food-item,.food-search-result{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .fname,.fi-name{font-weight:600;font-size:13px;}
  .fmacro,.fi-qty{font-size:11px;color:var(--muted);}
  .fi-kcal{font-size:12px;font-weight:700;color:var(--forest);}
  .fi-remove{background:none;border:none;color:var(--danger);font-size:18px;line-height:1;padding:4px;}
  .fadd{background:var(--forest);color:#fff;border:none;width:28px;height:28px;border-radius:8px;font-size:16px;line-height:1;}

  /* Meal blocks (diet builder) */
  .meal-block{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .subtotal{text-align:right;font-size:12px;color:var(--muted);margin-top:6px;}

  /* Food group results */
  .fr-group{margin-bottom:14px;}
  .fr-body{display:flex;justify-content:space-between;align-items:center;}
  .fr-icon{font-size:18px;}
  .fr-name{font-weight:600;font-size:13px;}
  .fr-kcal{font-size:12px;font-weight:700;color:var(--forest);}
  .fr-macros{font-size:11px;color:var(--muted);}
  .fr-bar-track{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:6px;}
  .fr-bar-fill{height:100%;background:var(--emerald);border-radius:999px;}

  /* Macro ring */
  .macro-ring-wrap{display:flex;justify-content:center;padding:10px 0;}
  .macro-ring{position:relative;width:150px;height:150px;}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-kcal{font-size:20px;font-weight:800;color:var(--forest);}
  .ring-label{font-size:11px;color:var(--muted);}
  .macro-legend{display:flex;justify-content:space-around;margin-top:10px;font-size:12px;}

  /* Template cards */
  .template-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
  .tname{font-weight:700;font-size:14px;}
  .tkcal{font-size:12px;color:var(--forest);font-weight:700;}
  .tmeals{font-size:12px;color:var(--muted);margin-top:2px;}

  .row{display:flex;justify-content:space-between;align-items:center;}
  .mono{font-variant-numeric:tabular-nums;}
  .icon{font-size:18px;}
  .title{font-weight:700;font-size:15px;}
  .val{font-weight:700;}

  /* Sticky counter (diet builder footer) */
  .sticky-counter{position:sticky;bottom:0;background:var(--forest);color:#fff;border-radius:14px;padding:12px 14px;margin-top:10px;font-size:13px;}

  /* Bottom nav */
  .bottomnav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto;}
  .navbtn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);font-weight:600;padding:4px 8px;flex:1;}
  .navbtn.active{color:var(--forest);}

  /* FAB */
  .fab{position:fixed;right:18px;bottom:84px;background:var(--forest);color:#fff;border:none;width:54px;height:54px;border-radius:50%;font-size:26px;box-shadow:0 6px 16px rgba(18,56,50,.35);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto;}
  .modal-handle{width:40px;height:4px;background:var(--line);border-radius:999px;margin:0 auto 14px;}
  .modal-title{font-size:16px;font-weight:800;margin-bottom:10px;color:var(--forest);}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--forest);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.25);}

  #sigCanvasProfile{width:100%;height:160px;border:1px dashed var(--line);border-radius:12px;background:#fff;touch-action:none;}
</style>
</head>
<body>
  <div id="app"></div>

  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
